apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingresses
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mariosangut/2-asir-bil-pasir-mario-sanchez-gutierrez.git'
    targetRevision: HEAD
    path: infra/ingresses
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
